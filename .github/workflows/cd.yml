name: CD - Deploy de Imagens

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"

jobs:
  # ─────────────────────────────────────────────
  # PUBLICAR IMAGENS NO DOCKER HUB (ou GHCR)
  # ─────────────────────────────────────────────
  push-images:
    name: Publicar Imagens Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Autenticação no GitHub Container Registry ──
      # Alternativa gratuita ao Docker Hub; use o GHCR
      # sem precisar criar secrets extras.
      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Tags automáticas baseadas em branch/tag ──
      - name: Gerar metadados - serviço de autenticação
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clinica-servico-autenticacao
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Gerar metadados - frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clinica-frontend-autenticacao
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build e Push - serviço de autenticação
        uses: docker/build-push-action@v5
        with:
          context: ./servico-autenticacao
          file: ./servico-autenticacao/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e Push - frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-autenticacao
          file: ./frontend-autenticacao/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo do deploy
        run: |
          echo "### Imagens publicadas 🚀" >> $GITHUB_STEP_SUMMARY
          echo "**Serviço de Autenticação:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-auth.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-frontend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
