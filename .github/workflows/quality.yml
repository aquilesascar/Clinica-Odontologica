name: Qualidade de Código

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ─────────────────────────────────────────────
  # 1. ANÁLISE DE DEPENDÊNCIAS (OWASP)
  # ─────────────────────────────────────────────
  dependency-check:
    name: Verificação de Vulnerabilidades (OWASP)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: servico-autenticacao/servico-autenticacao

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar OWASP Dependency Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=owasp-suppressions.xml \
            --no-transfer-progress || true

      - name: Upload relatório OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: servico-autenticacao/servico-autenticacao/target/dependency-check-report.html
          retention-days: 14

  # ─────────────────────────────────────────────
  # 2. COBERTURA DE TESTES (JaCoCo)
  # ─────────────────────────────────────────────
  coverage:
    name: Cobertura de Testes (JaCoCo)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinica_auth
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: servico-autenticacao/servico-autenticacao

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Gerar relatório de cobertura
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/clinica_auth
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn -B verify

      - name: Upload relatório JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: servico-autenticacao/servico-autenticacao/target/site/jacoco/
          retention-days: 14

      - name: Comentar cobertura no PR
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: servico-autenticacao/servico-autenticacao/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 60
          title: Cobertura de Testes
          update-comment: true

  # ─────────────────────────────────────────────
  # 3. ANÁLISE DE SECRETS EXPOSTOS (Gitleaks)
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Verificação de Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks - verificar secrets expostos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
