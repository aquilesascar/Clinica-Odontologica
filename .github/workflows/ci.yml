name: CI - Servico de Autenticacao

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD & TESTES UNITÁRIOS / INTEGRAÇÃO
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinica_auth
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: servico-autenticacao/servico-autenticacao

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Aguardar MySQL ficar pronto
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent 2>/dev/null; then
              echo "MySQL pronto!"
              break
            fi
            echo "Aguardando MySQL... tentativa $i"
            sleep 2
          done

      - name: Executar testes
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/clinica_auth
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn -B test

      - name: Build do JAR (sem testes, já executados)
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/clinica_auth
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn -B -DskipTests package

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: servico-autenticacao-jar
          path: servico-autenticacao/servico-autenticacao/target/*.jar
          retention-days: 7

      - name: Publicar relatório de testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Relatório JUnit
          path: servico-autenticacao/servico-autenticacao/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  # ─────────────────────────────────────────────
  # 2. BUILD DAS IMAGENS DOCKER
  # ─────────────────────────────────────────────
  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem do serviço de autenticação
        uses: docker/build-push-action@v5
        with:
          context: ./servico-autenticacao
          file: ./servico-autenticacao/Dockerfile
          push: false
          tags: clinica/servico-autenticacao:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build da imagem do frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-autenticacao
          file: ./frontend-autenticacao/Dockerfile
          push: false
          tags: clinica/frontend-autenticacao:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
