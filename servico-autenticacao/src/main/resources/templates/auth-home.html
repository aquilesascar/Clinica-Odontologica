<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area autenticada</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        .card { max-width: 500px; margin: 50px auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        h1 { margin-top: 0; }
        .info { margin: 8px 0; }
        a { display: inline-block; margin-top: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Login realizado com sucesso</h1>
    <p class="info"><strong>Usuario:</strong> <span th:text="${username}"></span></p>
    <p class="info"><strong>Role:</strong> <span th:text="${role}"></span></p>
    <a href="/auth/login-page">Sair</a>
</div>
</body>
</html>
