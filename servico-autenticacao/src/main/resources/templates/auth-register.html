<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Clinica</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        .card { max-width: 420px; margin: 50px auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        h1 { margin-top: 0; font-size: 22px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { margin-top: 18px; width: 100%; padding: 10px; border: 0; border-radius: 6px; background: #007bff; color: #fff; font-weight: bold; cursor: pointer; }
        .erro { margin-top: 12px; color: #c62828; }
        .link { margin-top: 16px; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h1>Cadastrar Usuario</h1>
    <form method="post" action="/auth/register-form">
        <label for="username">Username</label>
        <input id="username" name="username" required>

        <label for="senha">Senha</label>
        <input id="senha" type="password" name="senha" required>

        <label for="role">Role</label>
        <input id="role" name="role" value="USER" required>

        <button type="submit">Cadastrar</button>
    </form>

    <p class="erro" th:if="${erro}" th:text="${erro}"></p>
    <div class="link">
        <a href="/auth/login-page">Ja tenho conta</a>
    </div>
</div>
</body>
</html>
