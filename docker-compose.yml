services:
  mysql:
    image: mysql:8.0
    container_name: clinica-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_auth
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - clinica-net
    restart: unless-stopped

  servico-autenticacao:
    build: ./servico-autenticacao
    container_name: clinica-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clinica_auth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clinica-net
    restart: unless-stopped

  frontend-autenticacao:
    build: ./frontend-autenticacao
    container_name: clinica-auth-frontend
    ports:
      - "3000:80"
    depends_on:
      - servico-autenticacao
    networks:
      - clinica-net
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  clinica-net:
    driver: bridge
